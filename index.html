<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Custom Room Chess</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --light: #f0d9b5; --dark: #b58863; --high: rgba(255, 255, 0, 0.5); --hint: rgba(0, 0, 0, 0.15); }
        body { background: #2c3e50; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .menu { background: #34495e; padding: 20px; border-radius: 12px; margin-bottom: 20px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        input { padding: 10px; border-radius: 6px; border: none; width: 70%; margin-bottom: 10px; font-size: 1rem; text-align: center; }
        button { padding: 10px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 6px; font-weight: bold; margin: 5px; }
        button:hover { background: #2ecc71; }
        .secondary-btn { background: #3498db; }
        .secondary-btn:hover { background: #2980b9; }

        #board { display: grid; grid-template-columns: repeat(8, 60px); grid-template-rows: repeat(8, 60px); border: 6px solid #34495e; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .square { width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; }
        .light { background: var(--light); } .dark { background: var(--dark); }
        .selected { background: var(--high) !important; }
        .hint::after { content: ""; width: 18px; height: 18px; background: var(--hint); border-radius: 50%; position: absolute; z-index: 1; }
        .piece-img { width: 90%; height: 90%; object-fit: contain; pointer-events: none; z-index: 2; }
        #status { margin: 15px; font-size: 1.2rem; background: rgba(0,0,0,0.2); padding: 8px 20px; border-radius: 20px; }
    </style>
</head>
<body>

    <div class="menu" id="setup-menu">
        <h3>Chess Online</h3>
        <input type="text" id="room-id" placeholder="Enter 5-digit code (e.g. 12345)">
        <br>
        <button onclick="initPeer(true)">Create Room</button>
        <button class="secondary-btn" onclick="initPeer(false)">Join Room</button>
    </div>

    <div id="status">Enter a code to start</div>
    <div id="board"></div>

    <script>
        const boardEl = document.getElementById('board');
        const statusEl = document.getElementById('status');
        const game = new Chess();
        let peer = null;
        let conn = null;
        let myColor = null; 
        let selectedSq = null;
        let validMoves = [];

        // SPRITES: Change these to match your filenames!
        const pieces = {
            'p': { w: 'w_pawn.png',   b: 'b_pawn.png' },
            'r': { w: 'w_rook.png',   b: 'b_rook.png' },
            'n': { w: 'w_knight.png', b: 'b_knight.png' },
            'b': { w: 'w_bishop.png', b: 'b_bishop.png' },
            'q': { w: 'w_queen.png',  b: 'b_queen.png' },
            'k': { w: 'w_king.png',   b: 'b_king.png' }
        };

        function initPeer(isHost) {
            const code = document.getElementById('room-id').value;
            if (!code) return alert("Please enter a code!");

            // If hosting, we use the code as OUR id. If joining, we connect TO it.
            if (isHost) {
                peer = new Peer(code);
                myColor = 'w';
                
                peer.on('open', () => {
                    statusEl.innerText = "Room Created! Waiting for friend...";
                    document.getElementById('setup-menu').style.display = 'none';
                });

                peer.on('connection', (c) => {
                    conn = c;
                    setupConnection();
                });

                peer.on('error', (err) => {
                    if (err.type === 'unavailable-id') alert("Code already in use! Try another.");
                });

            } else {
                peer = new Peer(); // Joiner gets a random ID
                myColor = 'b';
                
                peer.on('open', () => {
                    conn = peer.connect(code);
                    setupConnection();
                    document.getElementById('setup-menu').style.display = 'none';
                });
            }
        }

        function setupConnection() {
            conn.on('open', () => {
                statusEl.innerText = `Connected! You are ${myColor === 'w' ? 'White' : 'Black'}.`;
                render();
            });
            conn.on('data', (move) => {
                game.move(move);
                render();
            });
        }

        function render() {
            boardEl.innerHTML = '';
            const layout = game.board();
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const sqName = String.fromCharCode(97 + j) + (8 - i);
                    const sq = document.createElement('div');
                    sq.className = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    if (selectedSq === sqName) sq.classList.add('selected');
                    if (validMoves.includes(sqName)) sq.classList.add('hint');
                    const p = layout[i][j];
                    if (p) {
                        sq.innerHTML = `<img src="${pieces[p.type][p.color]}" class="piece-img">`;
                    }
                    sq.onclick = () => handleSquareClick(sqName);
                    boardEl.appendChild(sq);
                }
            }
            updateStatus();
        }

        function updateStatus() {
            if (game.in_checkmate()) statusEl.innerText = "Checkmate!";
            else if (game.turn() === myColor) statusEl.innerText = "Your Turn";
            else statusEl.innerText = "Friend's Turn...";
        }

        function handleSquareClick(sq) {
            if (!conn || game.turn() !== myColor) return;
            if (validMoves.includes(sq)) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                conn.send(move);
                selectedSq = null; validMoves = [];
                render();
                return;
            }
            const piece = game.get(sq);
            if (piece && piece.color === myColor) {
                selectedSq = sq;
                validMoves = game.moves({ square: sq, verbose: true }).map(m => m.to);
            } else {
                selectedSq = null; validMoves = [];
            }
            render();
        }
    </script>
</body>
</html>
