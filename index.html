<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Grandmaster Chess</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --light: #f0d9b5; --dark: #b58863; --high: rgba(255, 255, 0, 0.5); --hint: rgba(0, 0, 0, 0.2); }
        body { background: #2c3e50; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin: 0; padding: 10px; min-height: 100vh; box-sizing: border-box; }
        .container { background: #34495e; padding: 25px; border-radius: 15px; text-align: center; width: 100%; max-width: 360px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        input { padding: 12px; border-radius: 8px; border: none; width: 85%; margin-bottom: 15px; font-size: 18px; text-align: center; }
        button { padding: 12px 20px; cursor: pointer; background: #27ae60; color: white; border: none; border-radius: 8px; font-weight: bold; margin: 5px; font-size: 16px; }
        #bot-menu { display: none; }
        .lvl-box { font-size: 4rem; font-weight: bold; color: #f1c40f; margin: 10px 0; }
        #board-wrapper { display: none; flex-direction: column; align-items: center; }
        #board { display: grid; grid-template-columns: repeat(8, 12.5%); grid-template-rows: repeat(8, 12.5%); width: 92vw; max-width: 450px; aspect-ratio: 1/1; border: 4px solid #34495e; background-color: #34495e; }
        .square { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; position: relative; }
        .light { background: var(--light); } .dark { background: var(--dark); }
        .selected { background: var(--high) !important; }
        .hint::after { content: ""; width: 25%; height: 25%; background: var(--hint); border-radius: 50%; position: absolute; }
        .piece-img { width: 90%; height: 90%; object-fit: contain; pointer-events: none; z-index: 2; }
        #status { margin-top: 15px; padding: 10px 20px; background: rgba(0,0,0,0.3); border-radius: 20px; font-weight: bold; transition: all 0.3s; text-align: center; }
    </style>
</head>
<body>

    <div class="container" id="setup-menu">
        <h2>Chess</h2>
        <input type="text" id="room-id" placeholder="Code or 'Bot'">
        <br>
        <button onclick="checkInput(true)">Create / Bot</button>
        <button style="background:#3498db" onclick="checkInput(false)">Join Room</button>
    </div>

    <div class="container" id="bot-menu">
        <h2>Difficulty</h2>
        <div class="lvl-box" id="lvl-num">1</div>
        <button onclick="changeLvl(-1)">←</button>
        <button onclick="startBotGame()">Play!</button>
        <button onclick="changeLvl(1)">→</button>
    </div>

    <div id="board-wrapper">
        <div id="board"></div>
        <div id="status">Waiting for game...</div>
    </div>

    <script>
        const game = new Chess();
        let myColor = 'w', botLevel = 1, isBotActive = false, selectedSq = null, validMoves = [], stockfish = null, conn = null, peer = null;
        let isResetting = false;

        const pieces = {
            'p': { w: 'w_pawn.png', b: 'b_pawn.png', val: 10 },
            'r': { w: 'w_rook.png', b: 'b_rook.png', val: 50 },
            'n': { w: 'w_knight.png', b: 'b_knight.png', val: 30 },
            'b': { w: 'w_bishop.png', b: 'b_bishop.png', val: 30 },
            'q': { w: 'w_queen.png', b: 'b_queen.png', val: 90 },
            'k': { w: 'w_king.png', b: 'b_king.png', val: 900 }
        };

        function checkInput(isHost) {
            const input = document.getElementById('room-id').value.trim().toLowerCase();
            if (input === 'bot') {
                document.getElementById('setup-menu').style.display = 'none';
                document.getElementById('bot-menu').style.display = 'block';
                window.addEventListener('keydown', (e) => {
                    if (document.getElementById('bot-menu').style.display === 'block') {
                        if (e.key === "ArrowLeft") changeLvl(-1);
                        if (e.key === "ArrowRight") changeLvl(1);
                        if (e.key === "Enter") startBotGame();
                    }
                });
            } else { initPeer(isHost, input); }
        }

        function initPeer(isHost, code) {
            document.getElementById('setup-menu').style.display = 'none';
            document.getElementById('board-wrapper').style.display = 'flex';
            peer = isHost ? new Peer(code) : new Peer();
            myColor = isHost ? 'w' : 'b';
            peer.on('open', () => {
                if(!isHost) { conn = peer.connect(code); setupConn(); }
                render();
            });
            peer.on('connection', (c) => { conn = c; setupConn(); });
        }

        function setupConn() {
            conn.on('open', () => render());
            conn.on('data', (move) => { game.move(move); render(); });
        }

        function changeLvl(dir) {
            botLevel = Math.max(1, Math.min(15, botLevel + dir));
            document.getElementById('lvl-num').innerText = botLevel;
        }

        function startBotGame() {
            isBotActive = true;
            document.getElementById('bot-menu').style.display = 'none';
            document.getElementById('board-wrapper').style.display = 'flex';
            if (botLevel === 15) initSF();
            render();
        }

        function initSF() {
            try {
                stockfish = new Worker('stockfish.js');
                stockfish.onmessage = (e) => {
                    if (e.data.includes('bestmove')) {
                        game.move(e.data.split(' ')[1], { sloppy: true });
                        render();
                    }
                };
            } catch(e) { botLevel = 14; }
        }

        function render() {
            const boardEl = document.getElementById('board');
            const statusEl = document.getElementById('status');
            boardEl.innerHTML = '';
            const layout = game.board();

            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    const sqName = String.fromCharCode(97 + j) + (8 - i);
                    const sq = document.createElement('div');
                    sq.className = `square ${(i + j) % 2 === 0 ? 'light' : 'dark'}`;
                    if (selectedSq === sqName) sq.classList.add('selected');
                    if (validMoves.includes(sqName)) sq.classList.add('hint');
                    const p = layout[i][j];
                    if (p) sq.innerHTML = `<img src="${pieces[p.type][p.color]}" class="piece-img">`;
                    if (!game.game_over()) { sq.onclick = () => handleSquareClick(sqName); }
                    boardEl.appendChild(sq);
                }
            }

            if (game.game_over()) {
                handleGameOver(statusEl);
            } else {
                statusEl.innerText = game.turn() === 'w' ? "White's Turn" : "Black's Turn";
            }
        }

        function handleGameOver(statusEl) {
            if (isResetting) return;
            isResetting = true;
            
            let result = "Game Over!";
            if (game.in_checkmate()) {
                result = `CHECKMATE! ${game.turn() === 'w' ? "Black" : "White"} Wins!`;
                statusEl.style.backgroundColor = "#27ae60";
            } else {
                result = "Draw!";
                statusEl.style.backgroundColor = "#e67e22";
            }

            let seconds = 5;
            const timer = setInterval(() => {
                statusEl.innerText = `${result} \n Resetting in ${seconds}...`;
                if (seconds <= 0) {
                    clearInterval(timer);
                    window.location.reload(); // Returns to main page
                }
                seconds--;
            }, 1000);
        }

        function handleSquareClick(sq) {
            if (game.turn() !== myColor) return;
            if (validMoves.includes(sq)) {
                const move = game.move({ from: selectedSq, to: sq, promotion: 'q' });
                if (conn) conn.send(move);
                selectedSq = null; validMoves = []; render();
                if (isBotActive && !game.game_over()) setTimeout(makeBot, 600);
            } else {
                const p = game.get(sq);
                if (p && p.color === myColor) {
                    selectedSq = sq;
                    validMoves = game.moves({ square: sq, verbose: true }).map(m => m.to);
                } else { selectedSq = null; validMoves = []; }
                render();
            }
        }

        function makeBot() {
            if (game.game_over()) return;
            if (botLevel === 15 && stockfish) {
                stockfish.postMessage("position fen " + game.fen());
                stockfish.postMessage("go depth 15");
            } else {
                const moves = game.moves({ verbose: true });
                if (botLevel > 1) moves.sort((a,b) => (b.captured ? pieces[b.captured].val : 0) - (a.captured ? pieces[a.captured].val : 0));
                game.move(moves[Math.min(Math.floor(Math.random()*(16-botLevel)), moves.length - 1)]);
                render();
            }
        }
    </script>
</body>
</html>
